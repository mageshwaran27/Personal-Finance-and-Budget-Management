<!DOCTYPE html>
<html>
<head>
  <title>Java Quiz App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Java Quiz App</h1>
    <div id="quiz-box"></div>
    <button id="submit-btn">Submit</button>
    <div id="result-box" class="hidden">
      <h2>Results</h2>
      <p id="score"></p>
      <p id="performance"></p>
      <button onclick="location.reload()">Restart</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
